name: civic_guide
description: A context-aware election process education assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.7+1
  http: ^1.2.1
  url_launcher: ^6.2.5
  image_picker: ^1.1.2
  speech_to_text: ^6.6.2
  flutter_tts: ^4.2.5
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.6.6
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  firebase_analytics: ^11.4.1

  google_sign_in_web: any
  google_sign_in_platform_interface: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true